plugins {
	id 'fabric-loom' version '1.10-SNAPSHOT'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
}

configurations {
	// A plain (non-mod) configuration that bypasses Fabric Loom remapping.
	// Use this for pure-Java libraries that are NOT Fabric mods.
	joltLibs
	compileClasspath.extendsFrom joltLibs
	runtimeClasspath.extendsFrom joltLibs
}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "net.minecraft:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// Jolt-JNI: resolved outside Loom remapping pipeline
	joltLibs "com.github.stephengold:jolt-jni:${project.jolt_jni_version}"
	joltLibs "com.github.stephengold:jolt-jni-Windows64:${project.jolt_jni_version}"
	joltLibs "com.github.stephengold:jolt-jni-Linux64:${project.jolt_jni_version}"
	joltLibs "com.github.stephengold:jolt-jni-MacOSX64:${project.jolt_jni_version}"
	joltLibs "com.github.stephengold:jolt-jni-MacOSX_ARM64:${project.jolt_jni_version}"
}

// Bundle jolt jars into the final mod jar
jar {
	inputs.property "archivesName", project.base.archivesName
	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}" }
	}
	// Include all jolt-jni jars (API + all platform natives) inside the mod jar
	from {
		configurations.joltLibs.collect { it.isDirectory() ? it : zipTree(it) }
	} {
		exclude 'META-INF/MANIFEST.MF'
		exclude 'META-INF/*.SF'
		exclude 'META-INF/*.DSA'
		exclude 'META-INF/*.RSA'
	}
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
	repositories {}
}
