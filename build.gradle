plugins {
	id 'fabric-loom' version '1.10-SNAPSHOT'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "net.minecraft:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// Jolt-JNI: pure-Java API (compile + runtime)
	implementation "com.github.stephengold:jolt-jni:${project.jolt_jni_version}"

	// Jolt-JNI: platform native libraries (runtime only, bundled in jar)
	runtimeOnly "com.github.stephengold:jolt-jni-Windows64:${project.jolt_jni_version}"
	runtimeOnly "com.github.stephengold:jolt-jni-Linux64:${project.jolt_jni_version}"
	runtimeOnly "com.github.stephengold:jolt-jni-MacOSX64:${project.jolt_jni_version}"
	runtimeOnly "com.github.stephengold:jolt-jni-MacOSX_ARM64:${project.jolt_jni_version}"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

jar {
	inputs.property "archivesName", project.base.archivesName
	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
	repositories {}
}
