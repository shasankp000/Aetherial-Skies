plugins {
	id 'fabric-loom' version '1.10-SNAPSHOT'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
}

configurations {
	joltLibs
	compileClasspath.extendsFrom joltLibs
	runtimeClasspath.extendsFrom joltLibs
}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	minecraft "net.minecraft:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	joltLibs files('libs/jolt-jni-Windows64-3.9.0.jar')
	joltLibs files('libs/jolt-jni-Linux64-3.9.0.jar')
	joltLibs files('libs/jolt-jni-MacOSX64-3.9.0.jar')
	joltLibs files('libs/jolt-jni-MacOSX_ARM64-3.9.0.jar')
}

// ---------------------------------------------------------------------------
// Build the jolt.libs.path value from the statically-known libs/ paths.
// We deliberately do NOT call configurations.joltLibs.resolvedConfiguration
// here because that would force dependency resolution during the configuration
// phase and corrupt Loom's internal repository state.
// ---------------------------------------------------------------------------
def joltJarNames = [
	'jolt-jni-Windows64-3.9.0.jar',
	'jolt-jni-Linux64-3.9.0.jar',
	'jolt-jni-MacOSX64-3.9.0.jar',
	'jolt-jni-MacOSX_ARM64-3.9.0.jar',
]
def joltLibsPathValue = joltJarNames
	.collect { new File(projectDir, "libs/${it}").absolutePath }
	.join(';')

loom {
	runs {
		client {
			vmArgs "-Djolt.libs.path=${joltLibsPathValue}"
		}
		server {
			vmArgs "-Djolt.libs.path=${joltLibsPathValue}"
		}
	}
}

jar {
	inputs.property "archivesName", project.base.archivesName
	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}" }
	}
	// Bundle all native libs flat at the jar root for the classpath-resource
	// fallback in JoltNativeLoader ("/joltjni.dll" etc.) used in production.
	from {
		configurations.joltLibs.collect { it.isDirectory() ? it : zipTree(it) }
	} {
		exclude 'META-INF/MANIFEST.MF'
		exclude 'META-INF/*.SF'
		exclude 'META-INF/*.DSA'
		exclude 'META-INF/*.RSA'
		duplicatesStrategy = DuplicatesStrategy.EXCLUDE
		eachFile { details ->
			def fn = details.name
			if (fn.endsWith('.dll') || fn.endsWith('.so') || fn.endsWith('.dylib')) {
				details.path = fn  // flatten to jar root
			}
		}
	}
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
	repositories {}
}
